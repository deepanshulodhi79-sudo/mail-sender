<!DOCTYPE html>
<html>

<head>

    <title>Mail Sender</title>

    <style>

        body{
            background:#0f0f0f;
            color:white;
            font-family:Arial;
            padding:40px;
            max-width:700px;
            margin:auto;
        }

        h1{
            text-align:center;
        }

        input, textarea{

            width:100%;
            padding:14px;
            margin-top:10px;
            margin-bottom:20px;

            border:none;
            border-radius:10px;

            background:#1e1e1e;
            color:white;

            font-size:16px;
        }

        button{

            width:100%;
            padding:14px;

            border:none;
            border-radius:10px;

            background:#00ff88;
            color:black;

            font-size:18px;
            font-weight:bold;

            cursor:pointer;
        }

        #result{
            margin-top:20px;
            text-align:center;
            font-size:18px;
        }

    </style>

</head>

<body>

    <h1>MAIL SENDER</h1>

    <input type="email" id="gmail" placeholder="Your Gmail">

    <input type="password" id="appPassword" placeholder="Google App Password">

    <input type="email" id="to" placeholder="Receiver Email">

    <input type="text" id="subject" placeholder="Subject">

    <textarea id="message" rows="10" placeholder="Message"></textarea>

    <button onclick="sendEmail()">
        SEND EMAIL
    </button>

    <div id="result"></div>

    <script>

        async function sendEmail(){

            const data = {

                gmail: document.getElementById("gmail").value,

                appPassword: document.getElementById("appPassword").value,

                to: document.getElementById("to").value,

                subject: document.getElementById("subject").value,

                message: document.getElementById("message").value
            };

            const response = await fetch("/send-email", {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body: JSON.stringify(data)

            });

            const result = await response.json();

            if(result.success){

                document.getElementById("result").innerHTML =
                    "Email Sent Successfully";

            } else {

                document.getElementById("result").innerHTML =
                    result.error;

            }

        }

    </script>

</body>

</html>
