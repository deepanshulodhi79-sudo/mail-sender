<!DOCTYPE html>
<html>
<head>
    <title>MAIL SENDER</title>
    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            padding: 40px;
            max-width: 700px;
            margin: auto;
        }
        h1 { text-align: center; }
        label {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 4px;
            display: block;
            margin-top: 10px;
        }
        input, textarea {
            width: 100%;
            padding: 14px;
            margin-top: 4px;
            margin-bottom: 20px;
            border: none;
            border-radius: 10px;
            background: #1f1f1f;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .hint {
            font-size: 12px;
            color: #666;
            margin-top: -16px;
            margin-bottom: 16px;
        }
        .hint code {
            color: #00ff88;
            background: #1a1a1a;
            padding: 1px 5px;
            border-radius: 4px;
        }

        /* Drop Zone */
        .drop-zone {
            width: 100%;
            padding: 28px;
            margin-top: 4px;
            margin-bottom: 8px;
            border: 2px dashed #333;
            border-radius: 10px;
            background: #1a1a1a;
            color: #777;
            font-size: 15px;
            text-align: center;
            cursor: pointer;
            box-sizing: border-box;
            position: relative;
            transition: border-color 0.2s, background 0.2s;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #00ff88;
            background: #141f18;
            color: #00ff88;
        }
        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        .drop-zone .icon { font-size: 2rem; display: block; margin-bottom: 6px; }

        /* Preview table */
        .preview-wrap {
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
        }
        .preview-wrap.show { display: block; }
        .preview-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: #222;
            font-size: 13px;
            color: #aaa;
        }
        .badge {
            background: #0d2e1c;
            color: #00ff88;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 20px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            text-align: left;
            padding: 8px 16px;
            color: #555;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            background: #1e1e1e;
        }
        td { padding: 8px 16px; border-top: 1px solid #252525; color: #ccc; }
        .more-row td { color: #555; font-style: italic; text-align: center; }

        /* Button */
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #00ff88;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
            transition: opacity 0.15s;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Progress */
        .progress-wrap {
            height: 5px;
            background: #222;
            border-radius: 5px;
            margin-top: 14px;
            display: none;
            overflow: hidden;
        }
        .progress-wrap.show { display: block; }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #00ff88;
            border-radius: 5px;
            transition: width 0.4s ease;
        }

        /* Result */
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #1f1f1f;
            white-space: pre-wrap;
            font-size: 15px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <h1>MAIL SENDER</h1>

    <!-- Credentials -->
    <div class="row">
        <div>
            <label>Your Gmail</label>
            <input type="email" id="gmail" placeholder="you@gmail.com"/>
        </div>
        <div>
            <label>App Password</label>
            <input type="password" id="appPassword" placeholder="xxxx xxxx xxxx xxxx"/>
        </div>
    </div>
    <label>Sender Display Name</label>
    <input type="text" id="senderName" placeholder="Your Name or Company"/>

    <!-- CSV Upload -->
    <label>Recipients CSV File</label>
    <div class="drop-zone" id="dropZone">
        <input type="file" id="csvFile" accept=".csv"/>
        <span class="icon">📄</span>
        <strong>Click to upload</strong> or drag & drop your CSV
    </div>
    <div class="hint">
        CSV must have two columns: <code>name</code> and <code>email</code>
        &nbsp;—&nbsp; example: <code>John,john@example.com</code>
    </div>

    <!-- Preview -->
    <div class="preview-wrap" id="previewWrap">
        <div class="preview-head">
            <span>Preview</span>
            <span class="badge" id="totalBadge">0 recipients</span>
        </div>
        <table>
            <thead><tr><th>#</th><th>Name</th><th>Email</th></tr></thead>
            <tbody id="previewBody"></tbody>
        </table>
    </div>

    <!-- Subject & Message -->
    <label>Subject</label>
    <input type="text" id="subject" placeholder="Hey {{name}}, here's something for you"/>
    <div class="hint">Use <code>{{name}}</code> to personalize the subject.</div>

    <label>Message</label>
    <textarea id="message" rows="10" placeholder="Hi {{name}},

Write your message here...

Best regards,
Your Name"></textarea>
    <div class="hint">Use <code>{{name}}</code> and <code>{{email}}</code> anywhere in the message.</div>

    <button id="sendBtn" onclick="sendEmail()">SEND EMAIL</button>

    <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="result">Waiting...</div>

<script>
let recipients = [];

const dropZone = document.getElementById('dropZone');
const csvFile  = document.getElementById('csvFile');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) parseCSV(e.dataTransfer.files[0]);
});
csvFile.addEventListener('change', e => {
    if (e.target.files[0]) parseCSV(e.target.files[0]);
});

function parseCSV(file) {
    const reader = new FileReader();
    reader.onload = e => {
        const lines = e.target.result.split('\n').map(l => l.trim()).filter(l => l);
        if (lines.length < 2) return setResult('CSV must have at least a header and one row.', true);

        const header = lines[0].toLowerCase().split(',').map(h => h.trim());
        const nameIdx  = header.indexOf('name');
        const emailIdx = header.indexOf('email');

        if (nameIdx === -1 || emailIdx === -1) {
            return setResult('CSV must have "name" and "email" columns.', true);
        }

        recipients = [];
        for (let i = 1; i < lines.length; i++) {
            const cols  = lines[i].split(',').map(c => c.trim());
            const name  = cols[nameIdx];
            const email = cols[emailIdx];
            if (name && email && email.includes('@')) recipients.push({ name, email });
        }

        renderPreview();
        setResult('✅ CSV loaded — ' + recipients.length + ' recipient(s) ready.', false);
    };
    reader.readAsText(file);
}

function renderPreview() {
    const wrap  = document.getElementById('previewWrap');
    const tbody = document.getElementById('previewBody');
    const badge = document.getElementById('totalBadge');

    badge.textContent = recipients.length + ' recipient' + (recipients.length !== 1 ? 's' : '');

    const show = recipients.slice(0, 6);
    tbody.innerHTML = show.map((r, i) =>
        `<tr><td>${i + 1}</td><td>${r.name}</td><td>${r.email}</td></tr>`
    ).join('') + (recipients.length > 6
        ? `<tr class="more-row"><td colspan="3">… and ${recipients.length - 6} more</td></tr>`
        : '');

    wrap.classList.add('show');
}

async function sendEmail() {
    const gmail       = document.getElementById('gmail').value.trim();
    const appPassword = document.getElementById('appPassword').value.trim();
    const senderName  = document.getElementById('senderName').value.trim();
    const subject     = document.getElementById('subject').value.trim();
    const message     = document.getElementById('message').value.trim();
    const btn         = document.getElementById('sendBtn');

    if (!gmail || !appPassword || !subject || !message) return setResult('❌ Please fill in all fields.', true);
    if (recipients.length === 0) return setResult('❌ Please upload a valid CSV with recipients.', true);

    btn.disabled = true;
    btn.innerText = 'SENDING...';
    setResult('Trying to send emails...', false);

    const progressWrap = document.getElementById('progressWrap');
    const progressBar  = document.getElementById('progressBar');
    progressWrap.classList.add('show');
    progressBar.style.width = '10%';

    try {
        const response = await fetch('/send-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ gmail, appPassword, senderName, recipients, subject, message })
        });

        progressBar.style.width = '100%';
        const result = await response.json();

        if (result.success) {
            setResult('EMAILS SENT SUCCESSFULLY ✅\n\nSent to ' + result.sent + ' recipient(s).', false);
        } else {
            setResult('FAILED ❌\n\n' + result.error, true);
        }
    } catch (error) {
        setResult('SERVER ERROR ❌\n\n' + error.message, true);
    }

    btn.disabled = false;
    btn.innerText = 'SEND EMAIL';
}

function setResult(msg, isError) {
    const el = document.getElementById('result');
    el.innerText = msg;
    el.style.color = isError ? '#ff4444' : '#aaa';
}
</script>
</body>
</html>
