<!DOCTYPE html>
<html>

<head>

    <title>Mail Sender</title>

    <style>

        body{
            background:#111;
            color:white;
            font-family:Arial;
            padding:40px;
            max-width:700px;
            margin:auto;
        }

        h1{
            text-align:center;
        }

        input, textarea{

            width:100%;
            padding:14px;
            margin-top:10px;
            margin-bottom:20px;

            border:none;
            border-radius:10px;

            background:#1f1f1f;
            color:white;

            font-size:16px;
        }

        button{

            width:100%;
            padding:15px;

            border:none;
            border-radius:10px;

            background:#00ff88;

            font-size:18px;
            font-weight:bold;

            cursor:pointer;
        }

        #result{

            margin-top:20px;

            padding:15px;

            border-radius:10px;

            background:#1f1f1f;

            white-space:pre-wrap;
        }

    </style>

</head>

<body>

    <h1>MAIL SENDER</h1>

    <input type="email" id="gmail" placeholder="Your Gmail">

    <input type="password" id="appPassword" placeholder="Google App Password">

    <input type="email" id="to" placeholder="Receiver Email">

    <input type="text" id="subject" placeholder="Subject">

    <textarea id="message" rows="10" placeholder="Message"></textarea>

    <button id="sendBtn" onclick="sendEmail()">
        SEND EMAIL
    </button>

    <div id="result">
        Waiting...
    </div>

    <script>

        async function sendEmail(){

            const resultDiv =
                document.getElementById("result");

            const btn =
                document.getElementById("sendBtn");

            btn.innerText = "SENDING...";

            resultDiv.innerHTML =
                "Trying To Send Email...";

            const data = {

                gmail:
                    document.getElementById("gmail").value,

                appPassword:
                    document.getElementById("appPassword").value,

                to:
                    document.getElementById("to").value,

                subject:
                    document.getElementById("subject").value,

                message:
                    document.getElementById("message").value
            };

            try{

                const response = await fetch("/send-email", {

                    method:"POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body: JSON.stringify(data)

                });

                const result = await response.json();

                if(result.success){

                    resultDiv.innerHTML =

                        "EMAIL SENT SUCCESSFULLY ✅";

                }else{

                    resultDiv.innerHTML =

                        "FAILED ❌\n\n" +

                        result.error;

                }

            }catch(error){

                resultDiv.innerHTML =

                    "SERVER ERROR ❌\n\n" +

                    error.message;

            }

            btn.innerText = "SEND EMAIL";

        }

    </script>

</body>

</html>
