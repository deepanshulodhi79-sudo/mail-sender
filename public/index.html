<!DOCTYPE html>
<html>
<head>
    <title>MAIL SENDER</title>
    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            padding: 40px;
            max-width: 700px;
            margin: auto;
        }
        h1 { text-align: center; }
        label {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 4px;
            display: block;
            margin-top: 10px;
        }
        input, textarea {
            width: 100%;
            padding: 14px;
            margin-top: 4px;
            margin-bottom: 6px;
            border: none;
            border-radius: 10px;
            background: #1f1f1f;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            font-family: Arial;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .hint {
            font-size: 12px;
            color: #555;
            margin-bottom: 18px;
            line-height: 1.6;
        }
        .hint code {
            color: #00ff88;
            background: #1a1a1a;
            padding: 1px 5px;
            border-radius: 4px;
        }

        /* Preview table */
        .preview-wrap {
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
        }
        .preview-wrap.show { display: block; }
        .preview-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: #222;
            font-size: 13px;
            color: #aaa;
        }
        .badge {
            background: #0d2e1c;
            color: #00ff88;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 20px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            text-align: left;
            padding: 8px 16px;
            color: #555;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            background: #1e1e1e;
        }
        td { padding: 8px 16px; border-top: 1px solid #252525; color: #ccc; }
        .more-row td { color: #555; font-style: italic; text-align: center; }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #00ff88;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
            transition: opacity 0.15s;
            margin-top: 10px;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .progress-wrap {
            height: 5px;
            background: #222;
            border-radius: 5px;
            margin-top: 14px;
            display: none;
            overflow: hidden;
        }
        .progress-wrap.show { display: block; }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #00ff88;
            border-radius: 5px;
            transition: width 0.4s ease;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #1f1f1f;
            white-space: pre-wrap;
            font-size: 15px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <h1>MAIL SENDER</h1>

    <!-- Credentials -->
    <div class="row">
        <div>
            <label>Your Gmail</label>
            <input type="email" id="gmail" placeholder="you@gmail.com"/>
        </div>
        <div>
            <label>App Password</label>
            <input type="password" id="appPassword" placeholder="xxxx xxxx xxxx xxxx"/>
        </div>
    </div>
    <label>Sender Display Name</label>
    <input type="text" id="senderName" placeholder="Your Name or Company" style="margin-bottom:20px"/>

    <!-- Recipients -->
    <label>Recipients</label>
    <textarea id="recipients" rows="7" oninput="parseRecipients()"
        placeholder="Type or paste recipients — one per line:

Name, email@example.com
John Smith, john@gmail.com
Sara Khan, sara@yahoo.com

Or email only (no name):
hello@example.com"></textarea>
    <div class="hint">
        Format: <code>Name, email</code> &nbsp;or just&nbsp; <code>email</code> — one per line.<br/>
        Comma or space separates name from email. Name is used for <code>{{name}}</code> in your message.
    </div>

    <!-- Live Preview -->
    <div class="preview-wrap" id="previewWrap">
        <div class="preview-head">
            <span>Preview</span>
            <span class="badge" id="totalBadge">0 recipients</span>
        </div>
        <table>
            <thead><tr><th>#</th><th>Name</th><th>Email</th></tr></thead>
            <tbody id="previewBody"></tbody>
        </table>
    </div>

    <!-- Subject & Message -->
    <label>Subject</label>
    <input type="text" id="subject" placeholder="Hey {{name}}, here's something for you"/>
    <div class="hint">Use <code>{{name}}</code> to personalize the subject.</div>

    <label>Message</label>
    <textarea id="message" rows="10"
        placeholder="Hi {{name}},

Write your message here...

Best regards,
Your Name"></textarea>
    <div class="hint">Use <code>{{name}}</code> and <code>{{email}}</code> anywhere in the message.</div>

    <button id="sendBtn" onclick="sendEmail()">SEND EMAIL</button>

    <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="result">Waiting...</div>

<script>
let recipients = [];

function parseRecipients() {
    const raw = document.getElementById('recipients').value;
    const lines = raw.split('\n').map(l => l.trim()).filter(l => l);

    recipients = [];
    for (const line of lines) {
        // Try "Name, email" or "Name email" split
        const commaIdx = line.lastIndexOf(',');
        if (commaIdx !== -1) {
            const name  = line.slice(0, commaIdx).trim();
            const email = line.slice(commaIdx + 1).trim();
            if (email.includes('@')) { recipients.push({ name: name || email, email }); continue; }
        }
        // Try last word as email
        const parts = line.split(/\s+/);
        const last  = parts[parts.length - 1];
        if (last.includes('@')) {
            const name = parts.slice(0, -1).join(' ').trim();
            recipients.push({ name: name || last, email: last });
            continue;
        }
        // Plain email only
        if (line.includes('@')) {
            recipients.push({ name: line, email: line });
        }
    }

    renderPreview();
}

function renderPreview() {
    const wrap  = document.getElementById('previewWrap');
    const tbody = document.getElementById('previewBody');
    const badge = document.getElementById('totalBadge');

    if (recipients.length === 0) { wrap.classList.remove('show'); return; }

    badge.textContent = recipients.length + ' recipient' + (recipients.length !== 1 ? 's' : '');
    const show = recipients.slice(0, 6);
    tbody.innerHTML = show.map((r, i) =>
        `<tr><td>${i + 1}</td><td>${r.name}</td><td>${r.email}</td></tr>`
    ).join('') + (recipients.length > 6
        ? `<tr class="more-row"><td colspan="3">… and ${recipients.length - 6} more</td></tr>`
        : '');

    wrap.classList.add('show');
}

async function sendEmail() {
    const gmail       = document.getElementById('gmail').value.trim();
    const appPassword = document.getElementById('appPassword').value.trim();
    const senderName  = document.getElementById('senderName').value.trim();
    const subject     = document.getElementById('subject').value.trim();
    const message     = document.getElementById('message').value.trim();
    const btn         = document.getElementById('sendBtn');

    if (!gmail || !appPassword || !subject || !message) return setResult('❌ Please fill in all fields.', true);
    if (recipients.length === 0) return setResult('❌ Please add at least one recipient.', true);

    btn.disabled = true;
    btn.innerText = 'SENDING...';
    setResult('Trying to send emails...', false);

    const progressWrap = document.getElementById('progressWrap');
    const progressBar  = document.getElementById('progressBar');
    progressWrap.classList.add('show');
    progressBar.style.width = '10%';

    try {
        const response = await fetch('/send-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ gmail, appPassword, senderName, recipients, subject, message })
        });

        progressBar.style.width = '100%';
        const result = await response.json();

        if (result.success) {
            setResult('EMAILS SENT SUCCESSFULLY ✅\n\nSent to ' + result.sent + ' recipient(s).', false);
        } else {
            setResult('FAILED ❌\n\n' + result.error, true);
        }
    } catch (error) {
        setResult('SERVER ERROR ❌\n\n' + error.message, true);
    }

    btn.disabled = false;
    btn.innerText = 'SEND EMAIL';
}

function setResult(msg, isError) {
    const el = document.getElementById('result');
    el.innerText = msg;
    el.style.color = isError ? '#ff4444' : '#aaa';
}
</script>
</body>
</html>
